<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nethera</title>

    <style>
        html, body { height: 100%; }
        body { margin:0; background:#121212; font-family:sans-serif; overflow:hidden; height:100vh; }

        #home { display: flex; height:100%; }

        /* Navigation (collapsible) */
        #nav-bar { width: 240px; background:#144659; color:#fff; padding:16px; box-sizing:border-box; position:relative; transition: width 200ms ease; overflow:visible; }
        #nav-bar.collapsed { width: 68px; }

        /* Brand: make background span full width of the nav (continuous color) */
        #nav-bar .brand { display:flex; align-items:center; gap:10px; margin: -16px -16px 12px -16px; background:#2FB09A; padding:12px 16px; border-radius:0; }
        #nav-bar .brand img { width:36px; height:36px; display:block; }
        #nav-bar .brand .name { font-size:28px; font-weight:800; color:#ffffff; }
        #nav-bar.collapsed .brand .name { display:none; }

        #nav-toggle { position:absolute; top:12px; right:-20px; background:rgba(255,255,255,0.04); border:0; color:#cfd6da; cursor:pointer; font-size:14px; padding:6px 8px; border-radius:6px; z-index:1000; pointer-events:auto; }

        #nav-bar h3.section-title { margin:8px 0 6px 0; font-size:12px; text-transform:uppercase; letter-spacing:0.6px; color:#9aa0a6; }
        #nav-bar.collapsed h3.section-title span.title-text { display:none; }

        #nav-bar .nav-list { list-style:none; padding:0; margin:6px 0 12px 0; }
        #nav-bar .nav-list li { margin:6px 0; }
        #nav-bar .nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; color:#e6e6e6; text-decoration:none; border-radius:6px; cursor:pointer; }
        #nav-bar .nav-item:hover { background:rgba(255,255,255,0.03); }
        #nav-bar .nav-item .icon { width:20px; height:20px; display:inline-flex; align-items:center; justify-content:center; color:#fff; }
        #nav-bar .nav-item .icon svg { width:20px; height:20px; display:block; fill:currentColor; }
        #nav-bar .nav-item .label { white-space:nowrap; }
        #nav-bar.collapsed .nav-item .label { display:none; }

        #nav-bar .spacer { height:12px; }

        /* Screen: fill remaining space and host the iframe */
        #screen { flex:1; min-height:100%; box-sizing:border-box; }

        #screen iframe { width:100%; height:100%; border:0; display:block; }
    </style>
</head>
<body>
    <div id="home">
        <div id="nav-bar">
            <button id="nav-toggle" aria-label="Toggle navigation">◀</button>
            <div class="brand">
                <img src="nethera_logo.png" alt="Nethera logo">
                <div class="name">Nethera</div>
            </div>

            <h3 class="section-title"><span class="title-text">Hauptmenü</span></h3>
            <ul class="nav-list">
                <li><a class="nav-item" data-src="overview.html"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 2h7l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zM13 3.5V9h5.5L13 3.5zM8 12h8v2H8v-2zm0 4h8v2H8v-2z"></path></svg></span><span class="label">Übersicht</span></a></li>
                <li><a class="nav-item"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 4h18v12H3zM1 18h22v2H1z"></path></svg></span><span class="label">Geräte</span></a></li>
                <li><a class="nav-item" data-src="topologie.html"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6l6-3 6 3 6-3v13l-6 3-6-3-6 3V6z"></path></svg></span><span class="label">Topologie</span></a></li>
            </ul>

            <div class="spacer"></div>

            <ul class="nav-list">
                <li><a class="nav-item"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20h14v-2H5v2zM7 10h2v8H7v-8zM11 6h2v12h-2V6zM15 14h2v4h-2v-4z"></path></svg></span><span class="label">Datenverkehr</span></a></li>
                <li><a class="nav-item"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.5A3.5 3.5 0 1 0 12 15.5 3.5 3.5 0 0 0 12 8.5zm7.4 3a5.9 5.9 0 0 0 0-1l2-1.2-2-3.5-2.4.8a6 6 0 0 0-1.7-.9L14 2H10l-.3 3.7c-.6.2-1.1.5-1.6.9L6 6.8 4 10.3l2 1.2a6 6 0 0 0 0 1L4 14.7 6 18l2.4-.8c.5.4 1 .7 1.6.9L10 22h4l.3-3.7c.6-.2 1.1-.5 1.7-.9L18 18l2-3.5-2-1.2z"></path></svg></span><span class="label">Konfiguration</span></a></li>
            </ul>

            <div class="spacer"></div>

            <h3 class="section-title"><span class="title-text">Fortgeschritten</span></h3>
            <ul class="nav-list">
                <li><a class="nav-item"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6V3L8 7l4 4V8a4 4 0 1 1-4 4H6a6 6 0 1 0 6-6z"></path></svg></span><span class="label">Daemon Status</span></a></li>
                <li><a class="nav-item"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18v2H3zM3 11h18v2H3zM3 17h18v2H3z"></path></svg></span><span class="label">Protokolle</span></a></li>
            </ul>
        </div>
        <div id="screen">
            <iframe id="screen-frame" src="topologie.html" title="Topologie"></iframe>
        </div>
            
    </div>
    <script>
        (function(){
            const nav = document.getElementById('nav-bar');
            const items = document.querySelectorAll('#nav-bar .nav-item');
            const frame = document.getElementById('screen-frame');
            const toggle = document.getElementById('nav-toggle');

            // Load initially stored state
            if(localStorage.getItem('nav-collapsed') === '1'){
                nav.classList.add('collapsed');
                toggle.textContent = '▶';
            }

            function loadIntoFrame(url){
                // Directly set iframe src (works with file:// and http://)
                try{
                    frame.src = url;
                }catch(e){
                    frame.srcdoc = `<div style="color:#111;background:#fff;padding:20px;font-family:sans-serif;"><h2>Fehler</h2><p>Kann <strong>${url}</strong> nicht laden.</p></div>`;
                }
            }

            items.forEach(it => {
                it.addEventListener('click', e => {
                    const url = it.getAttribute('data-src');
                    if(!url) return;
                    loadIntoFrame(url);
                });
            });

            toggle.addEventListener('click', () => {
                const collapsed = nav.classList.toggle('collapsed');
                toggle.textContent = collapsed ? '▶' : '◀';
                localStorage.setItem('nav-collapsed', collapsed ? '1' : '0');
            });
        })();
    </script>
</body>
</html>
