<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nethera</title>
  <link rel="icon" href="nethera_logo.png">
  <style>
    html, body { height: 100%; }
    body { margin: 0; background: #121212; font-family: "Avenir Next", "Segoe UI", sans-serif; overflow: hidden; }
    #home { display: flex; height: 100%; }
    #nav-bar { width: 240px; background: #144659; color: #fff; padding: 16px; box-sizing: border-box; position: relative; transition: width .25s ease; box-shadow: 6px 0 24px rgba(0,0,0,.45); z-index: 2; }
    #nav-bar.collapsed { width: 68px; }
    .brand { display: flex; align-items: center; gap: 10px; margin: -16px -16px 12px; background: #2FB09A; padding: 12px 16px; border-radius: 0 0 6px 6px; }
    .brand img { width: 36px; height: 36px; border-radius: 6px; }
    .brand .name { font-size: 22px; font-weight: 800; }
    #nav-bar.collapsed .name, #nav-bar.collapsed .label, #nav-bar.collapsed .title-text { display: none; }
    #nav-toggle { position: absolute; top: 12px; right: -20px; background: rgba(255,255,255,.08); border: 0; color: #fff; cursor: pointer; padding: 8px 10px; border-radius: 10px; box-shadow: 0 6px 14px rgba(0,0,0,.35); }
    #nav-bar.collapsed #nav-toggle { transform: rotate(180deg); }
    .section-title { margin: 12px 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #a9b4b7; }
    .nav-list { list-style: none; padding: 0; margin: 6px 0 12px; }
    .nav-list li { margin: 8px 0; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: #e6e6e6; text-decoration: none; border-radius: 8px; cursor: pointer; transition: background .16s ease, transform .16s ease; }
    .nav-item:hover { background: rgba(255,255,255,.06); transform: translateX(5px); }
    .nav-item.active { background: rgba(255,255,255,.11); box-shadow: inset 4px 0 0 #2FB09A; }
    .icon { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 22px; }
    .label { white-space: nowrap; font-weight: 650; font-size: 14px; }
    .spacer { height: 10px; }
    #screen { flex: 1; min-height: 100%; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    @media (max-width: 760px) {
      #home { flex-direction: column; }
      #nav-bar, #nav-bar.collapsed { width: 100%; height: auto; padding: 8px; display: grid; grid-template-columns: auto 1fr; gap: 8px; }
      #nav-toggle, .section-title, .spacer { display: none; }
      .brand { margin: 0; border-radius: 10px; padding: 8px; }
      .brand .name { display: none; }
      .nav-list { display: flex; gap: 6px; margin: 0; overflow-x: auto; align-items: center; }
      .nav-list li { margin: 0; }
      .nav-item { padding: 9px 10px; }
      .nav-item .label { display: inline !important; font-size: 12px; }
      #screen { min-height: 0; flex: 1; }
    }
  </style>
</head>
<body>
  <div id="home">
    <nav id="nav-bar" aria-label="Navigation">
      <button id="nav-toggle" aria-label="Navigation ein-/ausklappen">◀</button>
      <div class="brand"><img src="nethera_logo.png" alt="Nethera Logo"><div class="name">Nethera</div></div>

      <h3 class="section-title"><span class="title-text">Hauptmenü</span></h3>
      <ul class="nav-list">
        <li><a class="nav-item" data-src="overview.html"><span class="icon">▦</span><span class="label">Dashboard</span></a></li>
        <li><a class="nav-item" data-src="devices.html"><span class="icon">▣</span><span class="label">Clients</span></a></li>
        <li><a class="nav-item" data-src="topologie_custom.html"><span class="icon">⌘</span><span class="label">Topologie</span></a></li>
      </ul>

      <div class="spacer"></div>
      <ul class="nav-list">
        <li><a class="nav-item" data-src="traffic.html"><span class="icon">▥</span><span class="label">Datenverkehr</span></a></li>
        <li><a class="nav-item" data-src="configuration.html"><span class="icon">⚙</span><span class="label">Konfiguration</span></a></li>
        <li><a class="nav-item" data-src="account.html"><span class="icon">●</span><span class="label">Account</span></a></li>
      </ul>
    </nav>

    <main id="screen">
      <iframe id="screen-frame" src="overview.html" title="Nethera Dashboard"></iframe>
    </main>
  </div>

  <script>
    const nav = document.getElementById('nav-bar');
    const items = document.querySelectorAll('.nav-item');
    const frame = document.getElementById('screen-frame');
    const toggle = document.getElementById('nav-toggle');

    if (localStorage.getItem('nav-collapsed') === '1') nav.classList.add('collapsed');

    items.forEach(item => {
      item.addEventListener('click', () => {
        const url = item.dataset.src;
        if (!url) return;
        frame.src = url;
        items.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    items[0].classList.add('active');
    toggle.addEventListener('click', () => {
      const collapsed = nav.classList.toggle('collapsed');
      localStorage.setItem('nav-collapsed', collapsed ? '1' : '0');
    });
  </script>
</body>
</html>
