services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: nethera
      POSTGRES_USER: nethera
      POSTGRES_PASSWORD: nethera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nethera -d nethera"]
      interval: 5s
      timeout: 5s
      retries: 12

  keycloak-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak-pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ../../Applikation/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      - keycloak-postgres

  backend:
    build: .
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/nethera
      QUARKUS_DATASOURCE_USERNAME: nethera
      QUARKUS_DATASOURCE_PASSWORD: nethera
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  keycloak-pgdata:
